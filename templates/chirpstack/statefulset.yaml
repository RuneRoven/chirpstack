apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chirpstack
  namespace: {{ "general.namespace" | default "chirpstack" }}
spec:
  selector:
    matchLabels:
      app: chirpstack 
  serviceName: "chirpstack"
  replicas: 1 
  template:
    metadata:
      labels:
        app: chirpstack
    spec:
      containers:
      - name: chirpstack
        image: "{{ .Values.chirpstack.image.repository }}:{{ .Values.chirpstack.image.tag | default "chirpstack/chirpstack:4" }}"
        args:
        - "-c"
        - "/etc/chirpstack"
        imagePullPolicy: {{ .Values.chirpstack.image.pullPolicy }}
        env:
        - name: MQTT_BROKER_HOST
          value: mosquitto
        - name: REDIS_HOST
          value: redis
        - name: POSTGRESQL_HOST
          value: postgres
        ports:
        - containerPort: {{ .Values.chirpstack.service.port }}
          name: web
        volumeMounts:
        - name: {{ .Values.chirpstack.volumeMounts.name }}
          mountPath: {{ .Values.chirpstack.volumeMounts.mountPath }}
      volumes: 
      - name: {{ .Values.chirpstack.volumes.name }}
        configMap:
          name: {{ .Values.chirpstack.volumes.configMap.name }}